name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unittest:
    # Must be Windows: updater.py imports msvcrt / ctypes.wintypes at module load,
    # so it can't even be imported on Linux. The tests themselves are hermetic
    # (network and all system calls are mocked) — no real winws/Task Scheduler.
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [ "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
